openapi: 3.1.0
info:
  title: Naroom API
  description: Naroom 모바일 앱을 위한 백엔드 API
  version: v1
servers:
- url: /
paths:
  /api/v1/auth/refresh:
    post:
      tags:
      - auth-controller
      operationId: refresh
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseRefreshResponse"
  /api/v1/auth/logout:
    post:
      tags:
      - auth-controller
      operationId: logout
      responses:
        "204":
          description: No Content
  /api/v1/auth/kakao/login:
    post:
      tags:
      - auth-controller
      operationId: kakaoLogin
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KakaoLoginRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseKakaoLoginResponse"
  /api/v1/health:
    get:
      tags:
      - health-controller
      operationId: health
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseHealthResponse"
components:
  schemas:
    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
          minLength: 1
        installationKey:
          type: string
      required:
      - refreshToken
    ApiResponseRefreshResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/RefreshResponse"
    RefreshResponse:
      type: object
      properties:
        tokenType:
          type: string
        accessToken:
          type: string
        accessTokenExpiresAt:
          type: string
          format: date-time
        refreshToken:
          type: string
        refreshTokenExpiresAt:
          type: string
          format: date-time
        session:
          $ref: "#/components/schemas/SessionSummary"
    SessionSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        expiresAt:
          type: string
          format: date-time
    DeviceInfo:
      type: object
      properties:
        installationKey:
          type: string
        platform:
          type: string
        appVersion:
          type: string
    KakaoLoginRequest:
      type: object
      properties:
        providerAccessToken:
          type: string
          minLength: 1
        device:
          $ref: "#/components/schemas/DeviceInfo"
      required:
      - device
      - providerAccessToken
    Account:
      type: object
      properties:
        memberId:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - ACTIVE
          - LOCKED
          - PENDING_DELETION
        onboardingCompletedAt:
          type: string
          format: date-time
        version:
          type: integer
          format: int64
    ApiResponseKakaoLoginResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/KakaoLoginResponse"
    KakaoLoginResponse:
      type: object
      properties:
        tokenType:
          type: string
        accessToken:
          type: string
        accessTokenExpiresAt:
          type: string
          format: date-time
        refreshToken:
          type: string
        refreshTokenExpiresAt:
          type: string
          format: date-time
        session:
          $ref: "#/components/schemas/SessionSummary"
        account:
          $ref: "#/components/schemas/Account"
        nextAction:
          type: string
          enum:
          - COMPLETE_ONBOARDING
          - ENTER_APP
    ApiResponseHealthResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/HealthResponse"
    HealthResponse:
      type: object
      properties:
        status:
          type: string
  securitySchemes:
    bearerAuth:
      type: http
      name: bearerAuth
      scheme: bearer
      bearerFormat: JWT
