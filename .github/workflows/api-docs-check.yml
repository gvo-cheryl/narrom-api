name: API and Docs Check

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: naroom_ci
          POSTGRES_PASSWORD: naroom_ci_password
          POSTGRES_DB: naroom_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U naroom_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_URL: jdbc:postgresql://localhost:5432/naroom_ci
      DB_USERNAME: naroom_ci
      DB_PASSWORD: naroom_ci_password

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test
        run: ./gradlew test

      - name: Regenerate OpenAPI contract
        run: ./gradlew generateOpenApiDocs

      - name: Check committed OpenAPI contract is up to date
        run: git diff --exit-code -- docs/api/openapi.yaml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install documentation dependencies
        run: python -m pip install -r requirements-docs.txt

      - name: Build documentation (strict)
        run: mkdocs build --strict
